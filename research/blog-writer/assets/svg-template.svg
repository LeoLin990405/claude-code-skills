<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <!-- Theme colors as CSS custom properties -->
    <style>
      .bg      { fill: #0d1117; }
      .fg      { fill: #c9d1d9; }
      .accent  { fill: #6C63FF; }
      .accent2 { fill: #58a6ff; }
      .muted   { fill: #8b949e; }
      .card    { fill: #161b22; }
      .border  { stroke: #21262d; fill: none; }
      .green   { fill: #3fb950; }
      .orange  { fill: #d29922; }
      .red     { fill: #f85149; }

      /* Stroke variants */
      .stroke-accent  { stroke: #6C63FF; fill: none; }
      .stroke-accent2 { stroke: #58a6ff; fill: none; }
      .stroke-muted   { stroke: #8b949e; fill: none; }
      .stroke-green   { stroke: #3fb950; fill: none; }
      .stroke-orange  { stroke: #d29922; fill: none; }
      .stroke-red     { stroke: #f85149; fill: none; }

      /* Typography */
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .title   { font-size: 18px; font-weight: 700; }
      .label   { font-size: 13px; font-weight: 600; }
      .caption { font-size: 11px; }
      .small   { font-size: 10px; }

      /* Box styles */
      .node {
        fill: #161b22;
        stroke: #21262d;
        stroke-width: 1.5;
        rx: 6;
        ry: 6;
      }
      .node-accent {
        fill: #161b22;
        stroke: #6C63FF;
        stroke-width: 2;
        rx: 6;
        ry: 6;
      }
      .node-accent2 {
        fill: #161b22;
        stroke: #58a6ff;
        stroke-width: 2;
        rx: 6;
        ry: 6;
      }

      /* Arrow markers */
      .arrow { fill: #8b949e; }
      .arrow-accent { fill: #6C63FF; }
      .arrow-accent2 { fill: #58a6ff; }
    </style>

    <!-- Arrowhead markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
    <marker id="arrowhead-accent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-accent" />
    </marker>
    <marker id="arrowhead-accent2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-accent2" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" class="bg" />

  <!-- REPLACE BELOW WITH YOUR DIAGRAM CONTENT -->

  <!-- Example: A simple flow diagram -->
  <rect x="60" y="170" width="160" height="60" class="node-accent" />
  <text x="140" y="205" text-anchor="middle" class="fg label">Step 1</text>

  <line x1="220" y1="200" x2="280" y2="200" class="stroke-accent" stroke-width="2" marker-end="url(#arrowhead-accent)" />

  <rect x="280" y="170" width="160" height="60" class="node-accent2" />
  <text x="360" y="205" text-anchor="middle" class="fg label">Step 2</text>

  <line x1="440" y1="200" x2="500" y2="200" class="stroke-accent2" stroke-width="2" marker-end="url(#arrowhead-accent2)" />

  <rect x="500" y="170" width="160" height="60" class="node" />
  <text x="580" y="205" text-anchor="middle" class="fg label">Step 3</text>

</svg>
